<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đặt hàng — BotThongMinh</title>
  <link rel="stylesheet" href="/site/shared/style.css">
  <script src="/site/shared/api.js"></script>
</head>
<body>
  <header>
    <h1>BotThongMinh</h1>
    <nav>
      <a href="/site/portal.html">Shop</a>
      <a href="/site/orders/">Đơn hàng</a>
    </nav>
  </header>

  <div class="container" style="max-width: 700px;">
    <h2 style="margin-bottom: 1.5rem;">Tạo đơn hàng mới</h2>

    <form id="order-form">
      <div class="form-group">
        <label for="email">Email của bạn *</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="phone">Số điện thoại</label>
        <input type="tel" id="phone" name="phone" placeholder="+84..." />
      </div>
      <div class="form-group">
        <label for="product_type">Loại sản phẩm *</label>
        <select id="product_type" name="product_type" required>
          <option value="website">Website Builder</option>
          <option value="mobile">Mobile App Builder</option>
          <option value="algorithm">Algorithm Store</option>
        </select>
      </div>
      <div class="form-group">
        <label for="spec">Mô tả yêu cầu *</label>
        <textarea id="spec" name="spec" rows="5" required placeholder="Mô tả chi tiết sản phẩm bạn muốn..."></textarea>
      </div>
      <div class="form-group">
        <label for="amount">Ngân sách (VND)</label>
        <input type="number" id="amount" name="amount" placeholder="5000000" />
      </div>
      <div class="form-group">
        <label for="payment">Phương thức thanh toán</label>
        <select id="payment" name="payment">
          <option value="momo">MoMo</option>
          <option value="bank">Chuyển khoản ngân hàng</option>
        </select>
      </div>

      <button type="submit" class="btn">Tạo thành phẩm</button>
    </form>

    <div id="result" style="margin-top: 2rem; display: none;"></div>
  </div>

  <footer>Apex Factory v6.x &copy; 2026</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('type')) {
      document.getElementById('product_type').value = params.get('type');
    }

    document.getElementById('order-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultDiv = document.getElementById('result');
      try {
        const data = await apex.post('/api/orders/create', {
          customer_email: document.getElementById('email').value,
          customer_phone: document.getElementById('phone').value || null,
          product_type: document.getElementById('product_type').value,
          spec_json: JSON.stringify({ description: document.getElementById('spec').value }),
          amount_vnd: parseInt(document.getElementById('amount').value) || null,
          payment_method: document.getElementById('payment').value,
        });
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div style="padding: 1.5rem; background: rgba(34,197,94,0.1); border: 1px solid var(--success); border-radius: 8px;">
            <h3 style="color: var(--success);">Đơn đã gửi thành công!</h3>
            <p style="margin-top: 0.5rem;">Mã đơn: #${data.order_id}</p>
            <p>Trạng thái: Chờ Owner duyệt</p>
            <p style="margin-top: 0.5rem; color: var(--muted);">Bạn sẽ nhận email khi Owner approve đơn hàng.</p>
          </div>
        `;
      } catch (err) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<p style="color: var(--danger);">Lỗi: ${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
